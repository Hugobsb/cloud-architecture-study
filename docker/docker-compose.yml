services:
  kafka:
    image: apache/kafka:4.0.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:4.0.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -ec
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --create \
          --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic text-processing \
          --partitions 3 \
          --replication-factor 1

  api:
    build:
      context: ../services/api
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      KAFKA_CLIENT_ID: api-service
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: text-processing
      NODE_ENV: development

  worker:
    build:
      context: ../services/worker
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_CLIENT_ID: worker-service
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: text-processing
      KAFKA_GROUP_ID: text-processing-group
      NODE_ENV: development
