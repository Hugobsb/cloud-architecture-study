apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: cloud-study
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      terminationGracePeriodSeconds: 30

      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka..."
              until nc -z my-cluster-kafka-bootstrap.strimzi 9092; do
                sleep 2
              done
              echo "Kafka is ready."

      containers:
        - name: api
          image: ${API_IMAGE}
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            - name: PORT
              value: "3000"

            - name: KAFKA_CLIENT_ID
              value: api-service

            - name: KAFKA_BROKERS
              value: my-cluster-kafka-bootstrap.strimzi:9092

            - name: KAFKA_TOPIC
              value: text-processing

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
