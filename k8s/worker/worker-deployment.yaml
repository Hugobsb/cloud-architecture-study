apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: cloud-study
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka..."
              until nc -z my-cluster-kafka-bootstrap.strimzi 9092; do
                sleep 2
              done
              echo "Kafka is ready."
      containers:
        - name: worker
          image: ${WORKER_IMAGE}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: NODE_ENV
              value: production
            - name: KAFKA_CLIENT_ID
              value: worker-service
            - name: KAFKA_BROKERS
              value: my-cluster-kafka-bootstrap.strimzi:9092
            - name: KAFKA_TOPIC
              value: text-processing
            - name: KAFKA_GROUP_ID
              value: text-processing-group
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep node
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep node
            initialDelaySeconds: 15
            periodSeconds: 20
