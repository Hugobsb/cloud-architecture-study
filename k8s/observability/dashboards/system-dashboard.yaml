apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-study-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"

data:
  cloud-study-dashboard.json: |
    {
      "title": "Cloud Study System",
      "schemaVersion": 38,
      "version": 3,
      "panels": [
        {
          "type": "timeseries",
          "title": "API Pods",
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=\"cloud-study\", pod=~\"api.*\"})",
              "legendFormat": "api pods"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Worker Pods",
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=\"cloud-study\", pod=~\"worker.*\"})",
              "legendFormat": "worker pods"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Infrastructure Pods",
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace!=\"cloud-study\"})",
              "legendFormat": "infra pods"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "CPU Usage",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"cloud-study\"}[5m]))",
              "legendFormat": "cpu usage"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Memory Usage",
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{namespace=\"cloud-study\"})",
              "legendFormat": "memory usage"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "API Process CPU User Seconds",
          "targets": [
            {
              "expr": "sum(rate(process_cpu_user_seconds_total{job=\"api\"}[5m]))",
              "legendFormat": "api cpu user seconds"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Worker Throughput",
          "targets": [
            {
              "expr": "sum(rate(jobs_processados_total{job=\"worker\"}[5m]))",
              "legendFormat": "jobs/s"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Worker Failures",
          "targets": [
            {
              "expr": "sum(rate(jobs_falhos_total{job=\"worker\"}[5m]))",
              "legendFormat": "failed jobs/s"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Worker Processing Latency P95",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(job_processing_duration_seconds_bucket{job=\"worker\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Kafka Consumer Lag",
          "targets": [
            {
              "expr": "sum(kafka_consumergroup_lag{consumergroup=\"text-processing-group\"})",
              "legendFormat": "lag"
            }
          ]
        }
      ]
    }
